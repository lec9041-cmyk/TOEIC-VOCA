<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TOEIC 단어시험</title>
  <style>
    body{font-family:system-ui,Segoe UI,Apple SD Gothic Neo,Malgun Gothic,sans-serif;margin:18px;line-height:1.35}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    select,input,button{padding:10px 12px;font-size:14px}
    button{cursor:pointer}
    .card{border:1px solid #ddd;border-radius:12px;padding:14px;margin:12px 0}
    .muted{color:#666;font-size:13px}
    .q{font-size:20px;font-weight:700;margin:6px 0 10px}
    .choices{display:grid;gap:10px}
    .choices button{text-align:left;border:1px solid #ddd;border-radius:12px;background:#fff}
    .pill{display:inline-block;border:1px solid #ddd;border-radius:999px;padding:4px 10px;font-size:12px;color:#444}
    .hidden{display:none}
    .ok{color:#0a7}
    .bad{color:#c23}
    code{background:#f6f6f6;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <h1>TOEIC 단어시험 📚</h1>
  <div class="muted">
    자동 로드: <code>./toeic_words_day1_30.csv</code> (index.html과 같은 폴더에 있어야 함)
  </div>

  <div class="card">
    <div class="row">
      <label><b>CSV(선택)</b></label>
      <input id="file" type="file" accept=".csv,text/csv" />
      <button id="clearBtn">저장 초기화</button>
      <span id="status" class="muted"></span>
    </div>
    <div class="muted" style="margin-top:10px">
      ✅ 기본은 자동 로드. (원하면 파일 업로드로 덮어쓰기 가능) <br/>
      ✅ 데이터는 브라우저에 저장됩니다(LocalStorage).
    </div>
  </div>

  <div class="card">
    <div class="row">
      <label><b>시험 DAY</b></label>
      <select id="daySelect"></select>

      <label><b>문제수</b></label>
      <select id="countSelect">
        <option>10</option><option>20</option><option selected>30</option><option>50</option><option>100</option>
      </select>

      <label><b>방향</b></label>
      <select id="dirSelect">
        <option value="en2ko" selected>영단어 → 뜻</option>
        <option value="ko2en">뜻 → 영단어</option>
      </select>

      <label><b>모드</b></label>
      <select id="modeSelect">
        <option value="mc" selected>4지선다</option>
        <option value="sa">주관식(보기 없음)</option>
      </select>

      <label><b>문제 이동</b></label>
      <select id="nextMode">
        <option value="auto" selected>자동</option>
        <option value="manual">수동(다음 버튼)</option>
      </select>

      <label><b>자동 속도</b></label>
      <select id="autoDelay">
        <option value="600">0.6초</option>
        <option value="900">0.9초</option>
        <option value="1200" selected>1.2초</option>
        <option value="1500">1.5초</option>
      </select>

      <button id="startBtn">시험 시작</button>
      <button id="redoWrongBtn" class="hidden">오답만 다시</button>
    </div>

    <div class="muted" style="margin-top:10px">
      저장된 DAY: <span id="dayCount">0</span>개
    </div>
  </div>

  <div id="quiz" class="card hidden">
    <div class="row">
      <span class="pill" id="progressPill">0/0</span>
      <span class="pill">점수: <b id="score">0</b></span>
      <span class="pill">오답: <b id="wrongN">0</b></span>
      <button id="stopBtn">끝내기</button>
    </div>

    <div class="q" id="question"></div>

    <div class="choices" id="choices"></div>

    <div id="shortAnswer" class="hidden" style="margin-top:10px">
      <div class="row">
        <input id="answerInput" placeholder="정답 입력" style="flex:1; min-width:220px" />
        <button id="submitAnswerBtn">제출</button>
        <button id="showAnswerBtn" type="button">정답 보기</button>
      </div>
      <div class="muted" style="margin-top:8px">
        뜻(한글)은 일부만 입력해도 정답 처리(포함 인정)
      </div>
    </div>

    <div id="feedback" class="muted" style="margin-top:10px"></div>
    <button id="nextBtn" class="hidden" style="margin-top:10px">다음 문제 ▶</button>
  </div>

<script>
  const KEY = "toeic_words_csv_v3_autoload_nextmode";

  const el = (id)=>document.getElementById(id);

  const fileInput = el("file");
  const statusEl = el("status");
  const daySelect = el("daySelect");
  const dayCountEl = el("dayCount");

  const countSelect = el("countSelect");
  const dirSelect = el("dirSelect");
  const modeSelect = el("modeSelect");
  const nextMode = el("nextMode");
  const autoDelay = el("autoDelay");
  const startBtn = el("startBtn");
  const redoWrongBtn = el("redoWrongBtn");

  const quiz = el("quiz");
  const question = el("question");
  const choicesEl = el("choices");
  const feedback = el("feedback");
  const progressPill = el("progressPill");
  const scoreEl = el("score");
  const wrongNEl = el("wrongN");
  const stopBtn = el("stopBtn");

  const shortAnswer = el("shortAnswer");
  const answerInput = el("answerInput");
  const submitAnswerBtn = el("submitAnswerBtn");
  const showAnswerBtn = el("showAnswerBtn");
  const nextBtn = el("nextBtn");

  const loadAll = () => JSON.parse(localStorage.getItem(KEY) || "{}");
  const saveAll = (obj) => localStorage.setItem(KEY, JSON.stringify(obj));

  function parseCSVLine(line){
    const out = [];
    let cur = "";
    let inQuotes = false;
    for(let i=0;i<line.length;i++){
      const ch = line[i];
      if(ch === '"'){
        if(inQuotes && line[i+1] === '"'){ cur += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if(ch === ',' && !inQuotes){
        out.push(cur); cur = "";
      } else cur += ch;
    }
    out.push(cur);
    return out.map(s => s.trim());
  }

  function parseCSV(text){
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    if(lines.length === 0) return {};

    const header = parseCSVLine(lines[0]).map(x=>x.toLowerCase());
    const idxDay = header.indexOf("day");
    const idxWord = header.indexOf("word");
    const idxMeaning = header.indexOf("meaning");
    if(idxDay < 0 || idxWord < 0 || idxMeaning < 0){
      throw new Error("CSV 헤더에 day,word,meaning이 있어야 해요 (day,no,word,meaning 추천)");
    }

    const data = {};
    for(let i=1;i<lines.length;i++){
      const cols = parseCSVLine(lines[i]);
      const day = (cols[idxDay] || "").toUpperCase().replace(/\s+/g,"");
      const w = (cols[idxWord] || "").trim();
      const m = (cols[idxMeaning] || "").trim();
      if(!day || !w || !m) continue;
      if(!data[day]) data[day] = [];
      data[day].push({ w, m });
    }

    for(const d of Object.keys(data)){
      const seen = new Set();
      data[d] = data[d].filter(p=>{
        const k = (p.w+"||"+p.m).toLowerCase();
        if(seen.has(k)) return false;
        seen.add(k);
        return true;
      });
    }
    return data;
  }

  function refreshDayList(){
    const all = loadAll();
    const days = Object.keys(all).sort((a,b)=>{
      const na = parseInt(a.replace(/\D/g,"")) || 0;
      const nb = parseInt(b.replace(/\D/g,"")) || 0;
      return na-nb;
    });

    daySelect.innerHTML = "";
    for(const d of days){
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = `${d} (${all[d].length})`;
      daySelect.appendChild(opt);
    }
    dayCountEl.textContent = String(days.length);
  }

  function normalize(s){
    return String(s || "")
      .toLowerCase()
      .replace(/\s+/g,"")
      .replace(/[()"'“”‘’]/g,"")
      .trim();
  }

  function isMeaningCorrect(userInput, correctMeaning){
    const u = normalize(userInput);
    if(!u) return false;

    const parts = String(correctMeaning)
      .split(/[,;\/·]|(?:\s*-\s*)/g)
      .map(p => normalize(p))
      .filter(Boolean);

    if(parts.length === 0){
      const c = normalize(correctMeaning);
      return c.includes(u) || u.includes(c);
    }
    return parts.some(p => p.includes(u) || u.includes(p));
  }

  async function hydrateFromCSVText(text, label){
    const parsed = parseCSV(text);
    const all = loadAll();
    for(const day of Object.keys(parsed)) all[day] = parsed[day];
    saveAll(all);
    refreshDayList();
    statusEl.textContent = label;
  }

  async function autoLoadFromRepoIfEmpty(){
    const existing = loadAll();
    if(Object.keys(existing).length > 0){
      statusEl.textContent = "저장된 데이터 로드 완료";
      refreshDayList();
      return;
    }
    try{
      const res = await fetch("./toeic_words_day1_30.csv", { cache: "no-store" });
      if(!res.ok) throw new Error("CSV not found");
      const text = await res.text();
      await hydrateFromCSVText(text, "자동 로드 완료 (업로드 필요 없음)");
    } catch(e){
      statusEl.textContent = "자동 로드 실패: CSV가 같은 폴더에 있는지 확인!";
      refreshDayList();
    }
  }

  async function readFileAsText(file){ return await file.text(); }

  fileInput.addEventListener("change", async () => {
    const f = fileInput.files?.[0];
    if(!f) return;
    try{
      const text = await readFileAsText(f);
      await hydrateFromCSVText(text, `업로드 로드 완료: ${f.name}`);
    } catch(err){
      statusEl.textContent = `업로드 에러: ${err.message || err}`;
    }
  });

  el("clearBtn").onclick = () => {
    if(confirm("저장된 단어 데이터를 모두 삭제할까요?")){
      localStorage.removeItem(KEY);
      statusEl.textContent = "초기화 완료";
      refreshDayList();
    }
  };

  // --------- Quiz ----------
  let pool = [];
  let idx = 0;
  let score = 0;
  let wrong = [];

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }

  function pickChoices(correct, all, dir){
    const pick = [];
    const correctVal = dir==="en2ko" ? correct.m : correct.w;
    const seen = new Set([correctVal]);

    while(pick.length < 3 && all.length > 3){
      const cand = all[Math.floor(Math.random()*all.length)];
      const val = dir==="en2ko" ? cand.m : cand.w;
      if(!val || seen.has(val)) continue;
      seen.add(val);
      pick.push(val);
    }
    const opts = shuffle([correctVal, ...pick]).slice(0,4);
    return { opts, correctVal };
  }

  function finish(){
    const total = pool.length;
    feedback.innerHTML = `끝! 점수 <b>${score}</b> / ${total} (오답 ${wrong.length})`;
    window.__lastWrong = wrong;
    if(wrong.length > 0) redoWrongBtn.classList.remove("hidden");
  }

  function goNext(){
    nextBtn.classList.add("hidden");
    idx++;
    if(idx >= pool.length) finish();
    else render();
  }

  function scheduleNext(){
    if(nextMode.value === "manual"){
      nextBtn.classList.remove("hidden");
      nextBtn.onclick = goNext;
      return;
    }
    const ms = parseInt(autoDelay.value,10) || 1200;
    setTimeout(goNext, ms);
  }

  function judge(ok, item, dir){
    const correctText = (dir==="en2ko") ? item.m : item.w;

    if(ok){
      score++;
      feedback.innerHTML = `<span class="ok">정답!</span>`;
    } else {
      wrong.push(item);
      feedback.innerHTML = `<span class="bad">오답!</span> 정답: <b>${correctText}</b>`;
    }

    scoreEl.textContent = String(score);
    wrongNEl.textContent = String(wrong.length);

    scheduleNext();
  }

  function render(){
    nextBtn.classList.add("hidden");

    progressPill.textContent = `${idx+1}/${pool.length}`;
    scoreEl.textContent = String(score);
    wrongNEl.textContent = String(wrong.length);

    const dir = dirSelect.value;
    const mode = modeSelect.value;

    const item = pool[idx];
    question.textContent = (dir==="en2ko") ? item.w : item.m;

    choicesEl.innerHTML = "";
    feedback.textContent = "";

    // UI toggle
    if(mode === "sa"){
      choicesEl.classList.add("hidden");
      shortAnswer.classList.remove("hidden");
      answerInput.value = "";
      answerInput.focus();
    } else {
      choicesEl.classList.remove("hidden");
      shortAnswer.classList.add("hidden");
    }

    const all = loadAll()[daySelect.value] || [];

    if(mode === "mc"){
      const { opts, correctVal } = pickChoices(item, all, dir);
      choicesEl.innerHTML = "";
      opts.forEach((opt) => {
        const b = document.createElement("button");
        b.textContent = opt;
        b.onclick = () => judge(opt === correctVal, item, dir);
        choicesEl.appendChild(b);
      });
      return;
    }

    // Short answer
    submitAnswerBtn.onclick = () => {
      const user = (answerInput.value || "").trim();
      let ok = false;

      if(dir === "en2ko") ok = isMeaningCorrect(user, item.m);
      else ok = normalize(user) === normalize(item.w);

      judge(ok, item, dir);
    };

    showAnswerBtn.onclick = () => {
      const correctText = (dir==="en2ko") ? item.m : item.w;
      feedback.innerHTML = `정답: <b>${correctText}</b>`;
    };

    answerInput.onkeydown = (e) => {
      if(e.key === "Enter") submitAnswerBtn.click();
    };
  }

  function start(withWrong=false){
    const all = loadAll();
    const day = daySelect.value;
    const list = all[day] || [];
    if(list.length === 0){
      alert("데이터가 없어요. (CSV가 같은 폴더에 있는지 확인!)");
      return;
    }

    const n = Math.min(parseInt(countSelect.value,10), list.length);
    idx = 0;
    score = 0;
    wrong = [];

    const src = withWrong ? (window.__lastWrong || []) : list;
    pool = shuffle([...src]).slice(0, Math.min(n, src.length));

    redoWrongBtn.classList.add("hidden");
    quiz.classList.remove("hidden");
    render();
  }

  startBtn.onclick = () => start(false);
  redoWrongBtn.onclick = () => start(true);
  stopBtn.onclick = () => { quiz.classList.add("hidden"); };

  // init
  refreshDayList();
  autoLoadFromRepoIfEmpty();
</script>
</body>
</html>
